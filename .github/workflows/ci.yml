name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test (Unit + Coverage)
        run: >
          dotnet test tests/WalkForward.Tests.Unit/WalkForward.Tests.Unit.csproj
          --no-build -c Release
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Threshold=90
          /p:ThresholdType=line
          /p:ThresholdStat=total
          /p:ExcludeByAttribute=ExcludeFromCodeCoverage
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory ./TestResults

      - name: Test (Architecture)
        run: >
          dotnet test tests/WalkForward.Tests.Architecture/WalkForward.Tests.Architecture.csproj
          --no-build -c Release
          --logger "trx;LogFileName=arch-results.trx"
          --results-directory ./TestResults

      - name: Test (Performance)
        run: >
          dotnet test tests/WalkForward.Tests.Performance/WalkForward.Tests.Performance.csproj
          --no-build -c Release
          --logger "trx;LogFileName=perf-results.trx"
          --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults/*.trx
          retention-days: 14
